name: Build Docker Images for All Services
'on':
  push:
    branches:
      - main
  pull_request: null
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - authenticationService
          - configService
          - couponService
          - HealthService
          - kitchenOrderService
          - menuService
          - mqttService
          - orderService
          - outBoundService
          - paymentService
          - redisService
          - sellingSerivice
          - UIservice
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.service }}:latest ./${{ matrix.service }}
          docker build -t ${{ matrix.service }}:latest ./${{ matrix.service }}
      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKER_USERNAME }}'
          password: '${{ secrets.DOCKER_PASSWORD }}'
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: >
          docker tag ${{ matrix.service }}:latest ${{ secrets.DOCKER_USERNAME
          }}/${{ matrix.service }}:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service
          }}:latest
